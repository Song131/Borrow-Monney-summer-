<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>การชำระเงิน - ระบบกู้ยืมเงินรายย่อย</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>💰 MicroLoan</span><small>ระบบกู้ยืมเงินรายย่อย</small></div>
    <nav class="sidebar-nav">
      <a href="/index.html" class="nav-item"><span class="icon">📊</span><span>แดชบอร์ด</span></a>
      <a href="/customers.html" class="nav-item"><span class="icon">👥</span><span>ลูกหนี้</span></a>
      <a href="/loans.html" class="nav-item"><span class="icon">📋</span><span>สัญญากู้ยืม</span></a>
      <a href="/payments.html" class="nav-item"><span class="icon">💳</span><span>การชำระเงิน</span></a>
    </nav>
    <div class="sidebar-bottom">แอดมิน: <span id="admin-name">-</span></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-title">💳 รายการชำระรอตรวจสอบ</div>
      <button id="logout-btn" class="btn btn-outline btn-sm">ออกจากระบบ</button>
    </header>

    <div class="content">
      <div class="alert alert-info" style="margin-bottom:20px">
        ℹ️ เมื่อ Admin อนุมัติการชำระ ระบบจะหักยอดหนี้คงค้างอัตโนมัติ และปิดสัญญาเมื่อชำระครบ
      </div>

      <div class="card">
        <div class="card-title">⏳ รายการรอตรวจสอบ <span id="pending-count" style="background:#fee2e2;color:#7f1d1d;padding:2px 8px;border-radius:10px;font-size:12px"></span></div>
        <div class="table-wrap">
          <table id="pending-table">
            <thead>
              <tr>
                <th>#</th>
                <th>ลูกหนี้</th>
                <th>สัญญา</th>
                <th>ยอดชำระ</th>
                <th>วิธี</th>
                <th>วันที่แจ้ง</th>
                <th>สลิป</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="pending-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Slip View Modal -->
<div class="modal-bg" id="slip-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-title">🧾 สลิปการโอนเงิน</div>
    <img id="slip-img" style="width:100%;border-radius:8px;max-height:500px;object-fit:contain" src="">
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('slip-modal').classList.remove('open')">ปิด</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
async function loadPending() {
  try {
    const data = await api('GET', '/api/payments/pending');
    const cnt = document.getElementById('pending-count');
    cnt.textContent = data.length > 0 ? data.length + ' รายการ' : '';
    cnt.style.display = data.length > 0 ? 'inline' : 'none';

    const tbody = document.getElementById('pending-body');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#16a34a;padding:40px;font-size:16px">✅ ไม่มีรายการรอตรวจสอบ</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(p => `
      <tr>
        <td style="color:#6b7280">${p.id}</td>
        <td><strong>${p.firstName} ${p.lastName}</strong></td>
        <td><a href="/loan-detail.html?id=${p.loan_id}">#${p.loan_id}</a><br>
          <small style="color:#6b7280">${formatMoney(p.loanAmount)} บ. | ${p.rate}% | ${p.month} งวด</small></td>
        <td style="font-size:18px;font-weight:700;color:#1d4ed8">${formatMoney(p.payAmount)} บาท</td>
        <td>${p.method || '-'}</td>
        <td>${formatDate(p.payDate)}</td>
        <td>${p.cdnurl
          ? `<button class="btn btn-outline btn-sm" onclick="viewSlip('${p.cdnurl}')">🧾 ดูสลิป</button>`
          : '<span style="color:#6b7280;font-size:13px">ไม่มีสลิป</span>'}</td>
        <td>
          <button class="btn btn-success btn-sm" onclick="approve(${p.id},'อนุมัติ')">✅ อนุมัติ</button>
          <button class="btn btn-danger btn-sm" onclick="approve(${p.id},'ปฏิเสธ')">❌ ปฏิเสธ</button>
        </td>
      </tr>`).join('');
  } catch (err) { toast(err.message, 'error'); }
}

function viewSlip(url) {
  document.getElementById('slip-img').src = url;
  document.getElementById('slip-modal').classList.add('open');
}

async function approve(id, action) {
  const msg = action === 'อนุมัติ' ? 'อนุมัติและหักยอดหนี้' : 'ปฏิเสธรายการชำระ';
  if (!confirm(`ต้องการ${msg}?`)) return;
  try {
    const res = await api('PUT', `/api/payments/${id}/approve`, { action });
    toast(res.message, 'success');
    loadPending();
  } catch (err) { toast(err.message, 'error'); }
}

document.getElementById('slip-modal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

checkAuth().then(admin => { if (admin) loadPending(); });
</script>
</body>
</html>
