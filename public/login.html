<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบกู้ยืมเงินรายย่อย</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { margin: 0; background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px 28px;
      width: 400px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
      position: relative;
    }

    /* Logo */
    .logo { text-align: center; margin-bottom: 24px; }
    .logo-icon { font-size: 44px; }
    .logo-title { font-size: 20px; font-weight: 700; color: #065f46; margin-top: 6px; }
    .logo-sub { font-size: 13px; color: #9ca3af; margin-top: 2px; }

    /* Form panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Mode label */
    .mode-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .mode-label.customer { background: #dcfce7; color: #065f46; }
    .mode-label.admin    { background: #dbeafe; color: #1e40af; }

    /* Admin toggle button — มุมขวาล่าง */
    .admin-toggle {
      position: absolute;
      bottom: 20px;
      right: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      font-family: inherit;
      transition: 0.15s;
    }
    .admin-toggle:hover { background: #f3f4f6; color: #374151; }
    .admin-toggle .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #d1d5db;
      transition: 0.2s;
    }
    .admin-toggle.is-admin .dot { background: #3b82f6; }
    .admin-toggle.is-admin { color: #1e40af; }

    /* Submit button */
    .btn-cust  { background: #065f46; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.15s; }
    .btn-cust:hover  { background: #047857; }
    .btn-admin { background: #1d4ed8; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.15s; }
    .btn-admin:hover { background: #1e40af; }

    /* Password eye */
    .pw-wrap { position: relative; }
    .pw-wrap input { width: 100%; box-sizing: border-box; padding-right: 42px; }
    .pw-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #9ca3af; padding: 4px; }
    .pw-eye:hover { color: #374151; }

    /* Admin register link */
    .reg-link { text-align: center; font-size: 13px; color: #9ca3af; margin-top: 14px; }
    .reg-link a { color: #1d4ed8; text-decoration: none; }
    .reg-link a:hover { text-decoration: underline; }

    /* Form spacing */
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .fg input, .fg select {
      width: 100%; box-sizing: border-box;
      padding: 10px 12px; border: 1.5px solid #e5e7eb;
      border-radius: 8px; font-size: 15px; font-family: inherit;
      transition: 0.15s; color: #111;
    }
    .fg input:focus, .fg select:focus { outline: none; border-color: #065f46; box-shadow: 0 0 0 3px rgba(6,95,70,0.12); }
    .panel.admin .fg input:focus, .panel.admin .fg select:focus { border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,0.12); }

    .err { background: #fee2e2; color: #7f1d1d; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
  </style>
</head>
<body>
<div class="login-card">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div class="logo-title">ระบบกู้ยืมเงินรายย่อย</div>
    <div class="logo-sub">Micro Loan Management System</div>
  </div>

  <!-- ===== CUSTOMER PANEL (default) ===== -->
  <div class="panel active" id="panel-customer">
    <div class="mode-label customer">👤 ลูกหนี้</div>
    <div class="err" id="c-err"></div>
    <form id="form-customer">
      <div class="fg">
        <label>เลขบัตรประชาชน</label>
        <input type="text" id="c-citizen" placeholder="เลข 13 หลัก" maxlength="13"
          oninput="this.value=this.value.replace(/\D/g,'')" required>
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" id="c-phone" placeholder="0XX-XXX-XXXX" required>
      </div>
      <button type="submit" class="btn-cust">เข้าสู่ระบบ</button>
    </form>
    <div class="reg-link" style="color:#9ca3af">
      ยังไม่มีบัญชี? <a href="#" onclick="showCReg()" style="color:#065f46">สมัครสมาชิก</a>
    </div>
  </div>

  <!-- ===== CUSTOMER REGISTER PANEL ===== -->
  <div class="panel" id="panel-creg">
    <div class="mode-label customer">📝 สมัครสมาชิก ลูกหนี้</div>
    <div class="err" id="cr-err"></div>
    <form id="form-creg">
      <div class="fg">
        <label>ชื่อ <span style="color:#dc2626">*</span></label>
        <input type="text" id="cr-first" placeholder="ชื่อ">
      </div>
      <div class="fg">
        <label>นามสกุล <span style="color:#dc2626">*</span></label>
        <input type="text" id="cr-last" placeholder="นามสกุล">
      </div>
      <div class="fg">
        <label>เลขบัตรประชาชน <span style="color:#dc2626">*</span></label>
        <input type="text" id="cr-citizen" placeholder="เลข 13 หลัก" maxlength="13"
          oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
      <div class="fg">
        <label>เบอร์โทรศัพท์ <span style="color:#dc2626">*</span></label>
        <input type="tel" id="cr-phone" placeholder="0XX-XXX-XXXX">
      </div>
      <div class="fg">
        <label>อาชีพ <span style="color:#9ca3af;font-weight:400">(ไม่บังคับ)</span></label>
        <input type="text" id="cr-occ" placeholder="เช่น ค้าขาย, รับจ้าง">
      </div>
      <div class="fg">
        <label>รายได้ต่อเดือน (บาท) <span style="color:#9ca3af;font-weight:400">(ไม่บังคับ)</span></label>
        <input type="number" id="cr-income" placeholder="0" min="0">
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label>ที่อยู่ <span style="color:#9ca3af;font-weight:400">(ไม่บังคับ)</span></label>
        <textarea id="cr-address" placeholder="บ้านเลขที่ ถนน ตำบล อำเภอ จังหวัด" rows="3"
          style="width:100%;padding:10px 12px;border:1.5px solid #d1fae5;border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;box-sizing:border-box;outline:none"></textarea>
      </div>
      <button type="submit" class="btn-cust">สมัครสมาชิก</button>
    </form>
    <div class="reg-link" style="color:#9ca3af">
      มีบัญชีแล้ว? <a href="#" onclick="showCustomer()" style="color:#065f46">เข้าสู่ระบบ</a>
    </div>
  </div>

  <!-- ===== ADMIN PANEL ===== -->
  <div class="panel admin" id="panel-admin">
    <div class="mode-label admin">👔 Admin / Staff</div>
    <div class="err" id="a-err"></div>
    <form id="form-admin">
      <div class="fg">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="a-user" placeholder="username" autocomplete="username" required>
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label>รหัสผ่าน</label>
        <div class="pw-wrap">
          <input type="password" id="a-pass" placeholder="รหัสผ่าน" autocomplete="current-password" required>
          <button type="button" class="pw-eye" onclick="toggleEye('a-pass',this)">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-admin">เข้าสู่ระบบ Admin</button>
    </form>
    <div class="reg-link">
      ยังไม่มีบัญชี? <a href="#" onclick="showRegister()">สมัครสมาชิก Admin</a>
    </div>
  </div>

  <!-- ===== REGISTER PANEL ===== -->
  <div class="panel admin" id="panel-register">
    <div class="mode-label admin">📝 สมัคร Admin / Staff</div>
    <div class="err" id="r-err"></div>
    <form id="form-register">
      <div class="fg">
        <label>ชื่อ</label>
        <input type="text" id="r-first" placeholder="ชื่อ">
      </div>
      <div class="fg">
        <label>นามสกุล</label>
        <input type="text" id="r-last" placeholder="นามสกุล">
      </div>
      <div class="fg">
        <label>ชื่อผู้ใช้ <span style="color:#dc2626">*</span></label>
        <input type="text" id="r-user" placeholder="username" autocomplete="off">
      </div>
      <div class="fg">
        <label>รหัสผ่าน <span style="color:#dc2626">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="r-pass" placeholder="อย่างน้อย 6 ตัว" oninput="checkMatch()">
          <button type="button" class="pw-eye" onclick="toggleEye('r-pass',this)">👁️</button>
        </div>
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label>ยืนยันรหัสผ่าน <span style="color:#dc2626">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="r-confirm" placeholder="กรอกรหัสผ่านอีกครั้ง" oninput="checkMatch()">
          <button type="button" class="pw-eye" onclick="toggleEye('r-confirm',this)">👁️</button>
        </div>
        <div id="match-hint" style="font-size:12px;margin-top:4px;display:none"></div>
      </div>
      <button type="submit" class="btn-admin">สมัครสมาชิก</button>
    </form>
    <div class="reg-link">
      มีบัญชีแล้ว? <a href="#" onclick="showAdmin()">เข้าสู่ระบบ</a>
    </div>
  </div>

  <!-- Admin toggle button -->
  <button class="admin-toggle" id="toggle-btn" onclick="toggleMode()" title="สลับโหมด">
    <span class="dot"></span>
    <span id="toggle-label">Admin</span>
  </button>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
let mode = 'customer'; // 'customer' | 'admin' | 'register'

function show(panelId) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');
}

function toggleMode() {
  if (mode === 'customer' || mode === 'creg') {
    mode = 'admin';
    show('panel-admin');
    document.getElementById('toggle-btn').classList.add('is-admin');
    document.getElementById('toggle-label').textContent = '← ลูกหนี้';
  } else {
    mode = 'customer';
    show('panel-customer');
    document.getElementById('toggle-btn').classList.remove('is-admin');
    document.getElementById('toggle-label').textContent = 'Admin';
  }
}

function showCReg()     { mode = 'creg';     show('panel-creg'); }
function showCustomer() { mode = 'customer'; show('panel-customer'); document.getElementById('toggle-btn').classList.remove('is-admin'); document.getElementById('toggle-label').textContent='Admin'; }
function showRegister() { mode = 'register'; show('panel-register'); }
function showAdmin()    { mode = 'admin';    show('panel-admin'); }

function toggleEye(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁️' : '🙈';
}

function checkMatch() {
  const pw = document.getElementById('r-pass').value;
  const cf = document.getElementById('r-confirm').value;
  const hint = document.getElementById('match-hint');
  if (!cf) { hint.style.display = 'none'; return; }
  hint.style.display = 'block';
  if (pw === cf) { hint.textContent = '✅ รหัสผ่านตรงกัน'; hint.style.color = '#16a34a'; }
  else           { hint.textContent = '❌ รหัสผ่านไม่ตรงกัน'; hint.style.color = '#dc2626'; }
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}
function hideErr(id) { document.getElementById(id).style.display = 'none'; }

// Customer login
document.getElementById('form-customer').addEventListener('submit', async e => {
  e.preventDefault();
  hideErr('c-err');
  try {
    await api('POST', '/api/customer/login', {
      citizenNumber: document.getElementById('c-citizen').value.trim(),
      phone: document.getElementById('c-phone').value.trim()
    });
    window.location.href = '/customer/index.html';
  } catch (ex) { showErr('c-err', ex.message); }
});

// Admin login
document.getElementById('form-admin').addEventListener('submit', async e => {
  e.preventDefault();
  hideErr('a-err');
  try {
    await api('POST', '/api/auth/login', {
      username: document.getElementById('a-user').value,
      password: document.getElementById('a-pass').value
    });
    window.location.href = '/index.html';
  } catch (ex) { showErr('a-err', ex.message); }
});

// Register
document.getElementById('form-register').addEventListener('submit', async e => {
  e.preventDefault();
  hideErr('r-err');
  const pw = document.getElementById('r-pass').value;
  const cf = document.getElementById('r-confirm').value;
  const un = document.getElementById('r-user').value.trim();
  if (!un)         return showErr('r-err', 'กรุณากรอกชื่อผู้ใช้');
  if (pw.length<6) return showErr('r-err', 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
  if (pw !== cf)   return showErr('r-err', 'รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน');
  try {
    await api('POST', '/api/auth/register', {
      firstName: document.getElementById('r-first').value.trim(),
      lastName:  document.getElementById('r-last').value.trim(),
      username:  un, password: pw
    });
    window.location.href = '/index.html';
  } catch (ex) { showErr('r-err', ex.message); }
});

// Customer register
document.getElementById('form-creg').addEventListener('submit', async e => {
  e.preventDefault();
  hideErr('cr-err');
  const citizen = document.getElementById('cr-citizen').value.trim();
  const phone   = document.getElementById('cr-phone').value.trim();
  const first   = document.getElementById('cr-first').value.trim();
  const last    = document.getElementById('cr-last').value.trim();
  if (!first || !last)          return showErr('cr-err', 'กรุณากรอกชื่อ-นามสกุล');
  if (citizen.length !== 13)    return showErr('cr-err', 'เลขบัตรประชาชนต้องมี 13 หลัก');
  if (!phone)                   return showErr('cr-err', 'กรุณากรอกเบอร์โทรศัพท์');
  try {
    await api('POST', '/api/customer/register', {
      firstName: first, lastName: last,
      citizenNumber: citizen, phone,
      occupation:    document.getElementById('cr-occ').value.trim(),
      monthlyIncome: document.getElementById('cr-income').value || null,
      address:       document.getElementById('cr-address').value.trim() || null
    });
    window.location.href = '/customer/index.html';
  } catch (ex) { showErr('cr-err', ex.message); }
});

// Auto redirect ถ้า login ไว้แล้ว
api('GET','/api/auth/me').then(()=>location.href='/index.html').catch(()=>{});
api('GET','/api/customer/me').then(()=>location.href='/customer/index.html').catch(()=>{});
</script>
</body>
</html>
