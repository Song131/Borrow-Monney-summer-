<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>จัดการแอดมิน - ระบบกู้ยืมเงินรายย่อย</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>💰 MicroLoan</span><small>ระบบกู้ยืมเงินรายย่อย</small></div>
    <nav class="sidebar-nav">
      <a href="/index.html" class="nav-item"><span class="icon">📊</span><span>แดชบอร์ด</span></a>
      <a href="/customers.html" class="nav-item"><span class="icon">👥</span><span>ลูกหนี้</span></a>
      <a href="/loans.html" class="nav-item"><span class="icon">📋</span><span>สัญญากู้ยืม</span></a>
      <a href="/payments.html" class="nav-item"><span class="icon">💳</span><span>การชำระเงิน</span></a>
    </nav>
    <div class="sidebar-bottom">แอดมิน: <span id="admin-name">-</span></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-title">⚙️ จัดการแอดมิน</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="openAddModal()">+ เพิ่มแอดมิน</button>
        <button id="logout-btn" class="btn btn-outline btn-sm">ออกจากระบบ</button>
      </div>
    </header>

    <div class="content">
      <div class="alert alert-info" style="margin-bottom:20px">
        ℹ️ แอดมินทุกคนมีสิทธิ์เท่ากัน สามารถจัดการลูกหนี้ สัญญา และอนุมัติการชำระเงินได้
      </div>

      <div class="card">
        <div class="card-title">รายชื่อแอดมิน</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>ชื่อ-นามสกุล</th>
                <th>ชื่อผู้ใช้</th>
                <th>อีเมล</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="admin-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Admin Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">+ เพิ่มแอดมินใหม่</div>
    <div class="form-grid">
      <div class="form-group">
        <label>ชื่อ</label>
        <input type="text" id="f-firstName" placeholder="ชื่อ">
      </div>
      <div class="form-group">
        <label>นามสกุล</label>
        <input type="text" id="f-lastName" placeholder="นามสกุล">
      </div>
      <div class="form-group full">
        <label>ชื่อผู้ใช้ <span style="color:#dc2626">*</span></label>
        <input type="text" id="f-username" placeholder="username" autocomplete="off">
      </div>
      <div class="form-group full">
        <label>รหัสผ่าน <span style="color:#dc2626">*</span></label>
        <input type="password" id="f-password" placeholder="รหัสผ่าน" autocomplete="new-password">
      </div>
      <div class="form-group full">
        <label>อีเมล</label>
        <input type="email" id="f-email" placeholder="email (ไม่บังคับ)">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveAdmin()">💾 เพิ่มแอดมิน</button>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal-bg" id="pw-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-title">🔑 เปลี่ยนรหัสผ่าน</div>
    <input type="hidden" id="pw-admin-id">
    <div class="form-group" style="margin-bottom:16px">
      <label>รหัสผ่านใหม่ <span style="color:#dc2626">*</span></label>
      <input type="password" id="pw-new" placeholder="รหัสผ่านใหม่">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closePwModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="changePassword()">บันทึก</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
let myAdminId = null;

async function loadAdmins() {
  try {
    const data = await api('GET', '/api/auth/admins');
    const tbody = document.getElementById('admin-body');
    tbody.innerHTML = data.map(a => `
      <tr>
        <td style="color:#6b7280">${a.id}</td>
        <td><strong>${a.First_Name || ''} ${a.Last_Name || ''}</strong></td>
        <td><code style="background:#f3f4f6;padding:2px 8px;border-radius:4px">${a.username}</code></td>
        <td>${a.email || '-'}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="openPwModal(${a.id})">🔑 เปลี่ยนรหัส</button>
          ${a.id !== myAdminId ? `<button class="btn btn-danger btn-sm" onclick="deleteAdmin(${a.id},'${a.username}')">🗑️ ลบ</button>` : '<span style="font-size:12px;color:#6b7280;padding:0 8px">(คุณ)</span>'}
        </td>
      </tr>`).join('');
  } catch (err) { toast(err.message, 'error'); }
}

function openAddModal() {
  ['f-firstName','f-lastName','f-username','f-password','f-email'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveAdmin() {
  const data = {
    firstName: document.getElementById('f-firstName').value.trim(),
    lastName: document.getElementById('f-lastName').value.trim(),
    username: document.getElementById('f-username').value.trim(),
    password: document.getElementById('f-password').value,
    email: document.getElementById('f-email').value.trim()
  };
  if (!data.username || !data.password) return toast('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', 'error');
  try {
    await api('POST', '/api/auth/admins', data);
    toast('เพิ่มแอดมินเรียบร้อย', 'success');
    closeModal();
    loadAdmins();
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteAdmin(id, username) {
  if (!confirm(`ต้องการลบแอดมิน "${username}" ?`)) return;
  try {
    await api('DELETE', `/api/auth/admins/${id}`);
    toast('ลบแอดมินเรียบร้อย', 'success');
    loadAdmins();
  } catch (err) { toast(err.message, 'error'); }
}

function openPwModal(id) {
  document.getElementById('pw-admin-id').value = id;
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-modal').classList.add('open');
}

function closePwModal() { document.getElementById('pw-modal').classList.remove('open'); }

async function changePassword() {
  const id = document.getElementById('pw-admin-id').value;
  const password = document.getElementById('pw-new').value;
  if (!password) return toast('กรุณากรอกรหัสผ่านใหม่', 'error');
  try {
    await api('PUT', `/api/auth/admins/${id}/password`, { password });
    toast('เปลี่ยนรหัสผ่านเรียบร้อย', 'success');
    closePwModal();
  } catch (err) { toast(err.message, 'error'); }
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('pw-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closePwModal(); });

checkAuth().then(admin => {
  if (admin) {
    if (admin.id !== 1) {
      // ไม่ใช่ Super Admin → redirect กลับ dashboard
      toast('ไม่มีสิทธิ์เข้าถึงหน้านี้', 'error');
      setTimeout(() => window.location.href = '/index.html', 1500);
      return;
    }
    myAdminId = admin.id;
    loadAdmins();
  }
});
</script>
</body>
</html>
