<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลูกหนี้เข้าสู่ระบบ - ระบบกู้ยืมเงินรายย่อย</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #065f46 0%, #064e3b 100%);
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      width: 400px;
      max-width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      position: fixed;
      top: 20px;
      left: 20px;
    }
    .back-link:hover { color: #fff; }
  </style>
</head>
<body>
<a href="/" class="back-link">← กลับหน้าหลัก</a>

<div class="login-page">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:6px;font-size:36px">👤</div>
    <div style="text-align:center;font-size:20px;font-weight:700;color:#065f46;margin-bottom:4px">พอร์ทัลลูกหนี้</div>
    <div style="text-align:center;color:#6b7280;font-size:13px;margin-bottom:28px">ตรวจสอบสัญญาและชำระเงิน</div>

    <div id="error-msg" class="alert alert-danger" style="display:none"></div>

    <form id="login-form">
      <div class="form-group" style="margin-bottom:16px">
        <label>เลขบัตรประชาชน <span style="color:#dc2626">*</span></label>
        <input type="text" id="citizenNumber" placeholder="X-XXXX-XXXXX-XX-X" maxlength="13" required
          oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label>เบอร์โทรศัพท์ <span style="color:#dc2626">*</span></label>
        <input type="tel" id="phone" placeholder="0XX-XXX-XXXX" required>
      </div>
      <button type="submit" class="btn btn-success" style="width:100%;justify-content:center;padding:12px;font-size:15px;background:#065f46">
        เข้าสู่ระบบ
      </button>
    </form>

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #e5e7eb;text-align:center;font-size:13px;color:#9ca3af">
      เป็น Admin? <a href="/login.html" style="color:#1d4ed8">เข้าสู่ระบบ Admin</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
async function checkCustomerAuth() {
  try {
    const res = await api('GET', '/api/customer/me');
    if (res.id) window.location.href = '/customer/index.html';
  } catch { /* not logged in */ }
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('error-msg');
  err.style.display = 'none';
  try {
    await api('POST', '/api/customer/login', {
      citizenNumber: document.getElementById('citizenNumber').value.trim(),
      phone: document.getElementById('phone').value.trim()
    });
    window.location.href = '/customer/index.html';
  } catch (ex) {
    err.textContent = '❌ ' + ex.message;
    err.style.display = 'flex';
  }
});

checkCustomerAuth();
</script>
</body>
</html>
