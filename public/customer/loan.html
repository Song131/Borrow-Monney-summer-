<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>รายละเอียดสัญญา - พอร์ทัลลูกหนี้</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #f3f4f6; min-height: 100vh; }

    .c-header {
      background: linear-gradient(135deg, #065f46, #047857);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .c-header a { color: #fff; text-decoration: none; font-size: 22px; line-height: 1; }
    .c-header-info { flex: 1; }
    .c-header-title { font-weight: 700; font-size: 16px; }
    .c-header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }

    .c-content { max-width: 700px; margin: 0 auto; padding: 16px; }

    /* Summary hero */
    .hero {
      border-radius: 14px;
      padding: 22px 20px 18px;
      color: #fff;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #065f46, #047857);
    }
    .hero.overdue  { background: linear-gradient(135deg, #7f1d1d, #991b1b); }
    .hero.pending  { background: linear-gradient(135deg, #78350f, #92400e); }
    .hero.closed   { background: linear-gradient(135deg, #374151, #4b5563); }

    .hero-label { font-size: 12px; opacity: 0.8; margin-bottom: 3px; }
    .hero-amount { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 16px; }
    .hero-item .val { font-size: 17px; font-weight: 700; }
    .hero-item .lbl { font-size: 11px; opacity: 0.75; margin-top: 2px; }

    .hero-bar-wrap { margin-top: 14px; }
    .hero-bar-label { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.8; margin-bottom: 5px; }
    .hero-bar { height: 7px; background: rgba(255,255,255,0.25); border-radius: 4px; overflow: hidden; }
    .hero-bar-fill { height: 100%; background: #fff; border-radius: 4px; transition: width 0.5s; }

    .pay-btn {
      width: 100%; margin-top: 14px; padding: 11px;
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.5);
      color: #fff; border-radius: 9px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: 0.15s;
    }
    .pay-btn:hover:not(:disabled) { background: rgba(255,255,255,0.32); }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Card */
    .c-card { background: #fff; border-radius: 12px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .c-card-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

    /* Info rows */
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    .info-row:last-child { border: none; padding-bottom: 0; }
    .info-row .lbl { color: #6b7280; }
    .info-row .val { font-weight: 600; text-align: right; max-width: 60%; }

    /* Schedule table */
    .sch-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sch-table th { background: #f9fafb; padding: 8px 10px; text-align: center; font-weight: 600; color: #6b7280; font-size: 12px; white-space: nowrap; border-bottom: 2px solid #e5e7eb; }
    .sch-table td { padding: 9px 10px; border-bottom: 1px solid #f3f4f6; text-align: right; }
    .sch-table td:first-child { text-align: center; font-weight: 600; color: #6b7280; }
    .sch-table td:nth-child(2) { text-align: left; font-size: 12px; }
    .sch-table tr:last-child td { border: none; }
    .row-paid   { background: #f0fdf4; }
    .row-overdue{ background: #fff1f2; }
    .row-near   { background: #fffbeb; }

    /* Payment history */
    .pay-item { padding: 12px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    .pay-item:last-child { border: none; }
    .pay-status { font-size: 12px; font-weight: 700; }
    .st-approve { color: #16a34a; }
    .st-wait    { color: #d97706; }
    .st-reject  { color: #dc2626; }

    /* Modal */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal-sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-handle { width: 40px; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 0 auto 18px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }

    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .fg input, .fg select { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 9px; font-size: 15px; font-family: inherit; }
    .fg input:focus, .fg select:focus { outline: none; border-color: #065f46; box-shadow: 0 0 0 3px rgba(6,95,70,0.1); }

    .slip-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; border: 2px dashed #e5e7eb; margin-top: 8px; display: none; background: #f9fafb; }
    .submit-btn { width: 100%; padding: 13px; background: #065f46; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .submit-btn:hover { background: #047857; }
  </style>
</head>
<body>

<div class="c-header">
  <a href="/customer/index.html">←</a>
  <div class="c-header-info">
    <div class="c-header-title" id="h-title">สัญญากู้ยืม</div>
    <div class="c-header-sub" id="h-sub">กำลังโหลด...</div>
  </div>
  <button class="btn btn-outline btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.3);white-space:nowrap" onclick="window.open('/api/loans/'+loanId+'/contract','_blank')">
    🖨️ สัญญา
  </button>
</div>

<div class="c-content">

  <!-- Hero -->
  <div class="hero" id="hero">
    <div class="hero-label">วงเงินกู้</div>
    <div class="hero-amount" id="h-amount">-</div>
    <div class="hero-grid">
      <div class="hero-item"><div class="val" id="h-paid">-</div><div class="lbl">ชำระแล้ว (บ.)</div></div>
      <div class="hero-item"><div class="val" id="h-remain">-</div><div class="lbl">คงเหลือ (บ.)</div></div>
      <div class="hero-item"><div class="val" id="h-pmt">-</div><div class="lbl">ค่างวด/เดือน</div></div>
    </div>
    <div class="hero-bar-wrap">
      <div class="hero-bar-label"><span>ความคืบหน้า</span><span id="h-pct">0%</span></div>
      <div class="hero-bar"><div class="hero-bar-fill" id="h-bar" style="width:0%"></div></div>
    </div>
    <button class="pay-btn" id="pay-btn" onclick="openPay()">💳 ชำระเงิน / แนบสลิป</button>
  </div>

  <!-- ข้อมูลสัญญา -->
  <div class="c-card">
    <div class="c-card-title">📋 ข้อมูลสัญญา</div>
    <div id="loan-info"></div>
  </div>

  <!-- ตารางผ่อนชำระ -->
  <div class="c-card">
    <div class="c-card-title">📅 ตารางผ่อนชำระ</div>
    <div style="overflow-x:auto">
      <table class="sch-table" id="sch-table">
        <thead>
          <tr>
            <th>งวด</th>
            <th>วันครบกำหนด</th>
            <th>ค่างวด</th>
            <th>เงินต้น</th>
            <th>ดอกเบี้ย</th>
            <th>คงเหลือ</th>
            <th>สถานะ</th>
          </tr>
        </thead>
        <tbody id="sch-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ประวัติการชำระ -->
  <div class="c-card">
    <div class="c-card-title">🧾 ประวัติการชำระ</div>
    <div id="pay-history"></div>
  </div>

</div>

<!-- Payment Modal (bottom sheet) -->
<div class="modal-bg" id="pay-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">💳 ชำระเงิน</div>
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;color:#065f46">
      💡 ค่างวดปกติ <strong id="m-pmt-hint">-</strong> บาท/เดือน
    </div>
    <div id="bank-info-box" style="display:none;background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px">
      <div style="font-weight:700;color:#92400e;margin-bottom:8px">📤 โอนเงินมาที่</div>
      <div id="bank-info-content" style="line-height:2;color:#374151"></div>
    </div>
    <div class="fg">
      <label>ยอดชำระ (บาท) *</label>
      <input type="number" id="m-amount" placeholder="0.00" min="1">
    </div>
    <div class="fg">
      <label>วิธีการชำระ</label>
      <select id="m-method">
        <option value="โอน">โอนเงิน</option>
        <option value="QR Code">QR Code</option>
        <option value="เงินสด">เงินสด</option>
      </select>
    </div>
    <div class="fg" style="margin-bottom:20px">
      <label>สลิปการโอน *</label>
      <input type="file" id="m-slip" accept="image/*" onchange="previewSlip(this)">
      <img id="m-preview" class="slip-preview">
    </div>
    <button class="submit-btn" onclick="submitPay()">📤 ส่งหลักฐานการชำระ</button>
    <button style="width:100%;margin-top:10px;padding:11px;background:none;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;color:#6b7280" onclick="closePay()">ยกเลิก</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
const loanId = new URLSearchParams(window.location.search).get('id');

function calcPMT(p, r, n) {
  const mr = r / 100 / 12;
  if (mr === 0) return p / n;
  return (p * mr * Math.pow(1 + mr, n)) / (Math.pow(1 + mr, n) - 1);
}

function buildSchedule(amount, rate, months, startDate) {
  const r = rate / 100 / 12;
  const pmt = calcPMT(amount, rate, months);
  let bal = amount;
  const rows = [];
  for (let i = 1; i <= months; i++) {
    const interest   = bal * r;
    const principal  = pmt - interest;
    bal = Math.max(0, bal - principal);
    const due = new Date(startDate);
    due.setMonth(due.getMonth() + i);
    rows.push({ i, due: due.toISOString().split('T')[0], pmt, principal, interest, bal });
  }
  return rows;
}

async function load() {
  try {
    const { loan, payments } = await api('GET', `/api/customer/loans/${loanId}`);

    const amount   = parseFloat(loan.amount);
    const paid     = parseFloat(loan.totalPaid);
    const remain   = Math.max(0, amount - paid);
    const pct      = Math.min(100, (paid / amount) * 100);
    const pmt      = calcPMT(amount, parseFloat(loan.rate), loan.month);
    const overdue  = loan.loanStatus === 'active' && new Date(loan.dueDate) < new Date();
    const schedule = buildSchedule(amount, parseFloat(loan.rate), loan.month, loan.date);

    // Header
    const statusMap = { active:'🟢 กำลังดำเนินการ', pending:'🟡 รอดำเนินการ', closed:'✅ ปิดสัญญา', rejected:'🔴 ปฏิเสธ' };
    document.getElementById('h-title').textContent = `สัญญา #${loan.id}`;
    document.getElementById('h-sub').textContent   = statusMap[loan.loanStatus] || loan.loanStatus;

    // Hero
    const hero = document.getElementById('hero');
    if (overdue)                    hero.className = 'hero overdue';
    else if (loan.loanStatus === 'pending')  hero.className = 'hero pending';
    else if (loan.loanStatus === 'closed')   hero.className = 'hero closed';

    document.getElementById('h-amount').textContent = formatMoney(amount) + ' บาท';
    document.getElementById('h-paid').textContent   = formatMoney(paid);
    document.getElementById('h-remain').textContent = formatMoney(remain);
    document.getElementById('h-pmt').textContent    = formatMoney(pmt);
    document.getElementById('h-pct').textContent    = pct.toFixed(1) + '%';
    document.getElementById('h-bar').style.width    = pct + '%';
    document.getElementById('m-pmt-hint').textContent = formatMoney(pmt);

    const payBtn = document.getElementById('pay-btn');
    if (loan.loanStatus !== 'active') {
      payBtn.disabled = true;
      payBtn.textContent = loan.loanStatus === 'closed' ? '✅ ปิดสัญญาแล้ว' : '⏳ รอ Admin อนุมัติสัญญา';
    }
    if (overdue) payBtn.style.borderColor = 'rgba(255,255,255,0.7)';

    // Info
    document.getElementById('loan-info').innerHTML = `
      <div class="info-row"><span class="lbl">วงเงินกู้</span><span class="val">${formatMoney(amount)} บาท</span></div>
      <div class="info-row"><span class="lbl">อัตราดอกเบี้ย</span><span class="val">${loan.rate}% / ปี (ลดต้นลดดอก)</span></div>
      <div class="info-row"><span class="lbl">จำนวนงวด</span><span class="val">${loan.month} งวด</span></div>
      <div class="info-row"><span class="lbl">ค่างวด/เดือน</span><span class="val">${formatMoney(pmt)} บาท</span></div>
      <div class="info-row"><span class="lbl">วันที่ทำสัญญา</span><span class="val">${formatDate(loan.date)}</span></div>
      <div class="info-row"><span class="lbl">วันครบกำหนด</span><span class="val" style="color:${overdue?'#dc2626':'inherit'}">${formatDate(loan.dueDate)}${overdue?' ⚠️':''}</span></div>
      <div class="info-row"><span class="lbl">วัตถุประสงค์</span><span class="val">${loan.purpose || '-'}</span></div>`;

    // Schedule
    let cumPaid = paid;
    document.getElementById('sch-body').innerHTML = schedule.map(s => {
      const due  = new Date(s.due);
      const now  = new Date();
      let cls = '', badge = '';
      if (cumPaid >= s.pmt) {
        cls = 'row-paid'; badge = '<span style="font-size:11px;color:#16a34a;font-weight:700">✅ ชำระแล้ว</span>';
        cumPaid -= s.pmt;
      } else if (due < now) {
        cls = 'row-overdue'; badge = '<span style="font-size:11px;color:#dc2626;font-weight:700">⚠️ เกินกำหนด</span>';
      } else if (due <= new Date(now.getTime() + 7*24*60*60*1000)) {
        cls = 'row-near'; badge = '<span style="font-size:11px;color:#d97706;font-weight:700">🔔 ใกล้ครบ</span>';
      } else {
        badge = '<span style="font-size:11px;color:#9ca3af">รอชำระ</span>';
      }
      return `<tr class="${cls}">
        <td>${s.i}</td>
        <td>${s.due}</td>
        <td>${formatMoney(s.pmt)}</td>
        <td>${formatMoney(s.principal)}</td>
        <td>${formatMoney(s.interest)}</td>
        <td style="font-weight:600">${formatMoney(s.bal)}</td>
        <td style="text-align:center">${badge}</td>
      </tr>`;
    }).join('');

    // Payment history
    const histEl = document.getElementById('pay-history');
    if (!payments.length) {
      histEl.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:16px;font-size:14px">ยังไม่มีประวัติการชำระ</div>';
    } else {
      histEl.innerHTML = payments.map(p => {
        const stCls = { 'อนุมัติ':'st-approve','รอตรวจ':'st-wait','ปฏิเสธ':'st-reject' };
        const stIcon = { 'อนุมัติ':'✅','รอตรวจ':'⏳','ปฏิเสธ':'❌' };
        return `<div class="pay-item">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-weight:700;font-size:16px">${formatMoney(p.payAmount)} <span style="font-size:13px;font-weight:400;color:#6b7280">บาท</span></div>
              <div style="color:#9ca3af;font-size:12px;margin-top:3px">${formatDate(p.payDate)} · ${p.method || 'โอน'}</div>
            </div>
            <div style="text-align:right">
              <div class="pay-status ${stCls[p.stats]||''}">${stIcon[p.stats]||''} ${p.stats}</div>
              ${p.cdnurl ? `<a href="${p.cdnurl}" target="_blank" style="font-size:12px;color:#1d4ed8;display:block;margin-top:4px">ดูสลิป 🧾</a>` : ''}
            </div>
          </div>
          ${p.stats==='ปฏิเสธ'?'<div style="margin-top:8px;background:#fee2e2;color:#7f1d1d;border-radius:6px;padding:7px 10px;font-size:12px">❌ รายการนี้ถูกปฏิเสธ กรุณาติดต่อ Admin</div>':''}
        </div>`;
      }).join('');
    }
  } catch (err) {
    if (err.message.includes('ยังไม่ได้')) window.location.href = '/login.html';
    else toast(err.message, 'error');
  }
}

async function openPay() {
  document.getElementById('pay-modal').classList.add('open');
  try {
    const b = await api('GET', '/api/auth/bank-info');
    const box = document.getElementById('bank-info-box');
    const content = document.getElementById('bank-info-content');
    if (b && b.bankAccount) {
      let html = '';
      if (b.bankName)        html += `<div>🏦 ${b.bankName}</div>`;
      if (b.bankAccount)     html += `<div>💳 เลขบัญชี: <strong>${b.bankAccount}</strong></div>`;
      if (b.bankAccountName) html += `<div>👤 ชื่อบัญชี: <strong>${b.bankAccountName}</strong></div>`;
      if (b.promptpayId)     html += `<div>📱 พร้อมเพย์: <strong>${b.promptpayId}</strong></div>`;
      content.innerHTML = html;
      box.style.display = 'block';
    } else {
      box.style.display = 'none';
    }
  } catch { document.getElementById('bank-info-box').style.display = 'none'; }
}
function closePay() { document.getElementById('pay-modal').classList.remove('open'); }

function previewSlip(input) {
  const file = input.files[0];
  if (!file) return;
  const img = document.getElementById('m-preview');
  const reader = new FileReader();
  reader.onload = e => { img.src = e.target.result; img.style.display = 'block'; };
  reader.readAsDataURL(file);
}

async function submitPay() {
  const amount = document.getElementById('m-amount').value;
  const method = document.getElementById('m-method').value;
  const slip   = document.getElementById('m-slip').files[0];
  if (!amount) return toast('กรุณากรอกยอดชำระ', 'error');
  if (!slip)   return toast('กรุณาแนบสลิปการโอนเงิน', 'error');
  const fd = new FormData();
  fd.append('payAmount', amount);
  fd.append('method', method);
  fd.append('slip', slip);
  try {
    const res = await api('POST', `/api/customer/loans/${loanId}/pay`, fd, true);
    toast(res.message, 'success');
    closePay();
    document.getElementById('m-amount').value = '';
    document.getElementById('m-slip').value   = '';
    document.getElementById('m-preview').style.display = 'none';
    load();
  } catch (err) { toast(err.message, 'error'); }
}

document.getElementById('pay-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closePay(); });

if (!loanId) window.location.href = '/customer/index.html';
else api('GET', '/api/customer/me').then(() => load()).catch(() => window.location.href = '/login.html');
</script>
</body>
</html>
