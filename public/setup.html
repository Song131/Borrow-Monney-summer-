<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตั้งค่าแอดมิน - ระบบกู้ยืมเงินรายย่อย</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card" style="max-width:420px;width:420px">
    <div class="login-logo">⚙️ ตั้งค่าระบบครั้งแรก</div>
    <div class="login-subtitle">สร้างบัญชีผู้ดูแลระบบ (Admin)</div>

    <div id="msg" style="display:none" class="alert"></div>

    <form id="setup-form">
      <div class="form-grid" style="margin-bottom:16px">
        <div class="form-group">
          <label>ชื่อ</label>
          <input type="text" id="firstName" placeholder="ชื่อ" required>
        </div>
        <div class="form-group">
          <label>นามสกุล</label>
          <input type="text" id="lastName" placeholder="นามสกุล" required>
        </div>
        <div class="form-group full">
          <label>ชื่อผู้ใช้</label>
          <input type="text" id="username" placeholder="username" required>
        </div>
        <div class="form-group full">
          <label>รหัสผ่าน</label>
          <input type="password" id="password" placeholder="รหัสผ่าน" required>
        </div>
        <div class="form-group full">
          <label>อีเมล</label>
          <input type="email" id="email" placeholder="email (ไม่บังคับ)">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">
        สร้างบัญชีแอดมิน
      </button>
    </form>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
document.getElementById('setup-form').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  try {
    await api('POST', '/api/auth/setup', {
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
      email: document.getElementById('email').value
    });
    msg.className = 'alert alert-success';
    msg.textContent = '✅ สร้างบัญชีสำเร็จ กำลังไปหน้าเข้าสู่ระบบ...';
    msg.style.display = 'flex';
    setTimeout(() => window.location.href = '/login.html', 1500);
  } catch (ex) {
    msg.className = 'alert alert-danger';
    msg.textContent = ex.message;
    msg.style.display = 'flex';
  }
});
</script>
</body>
</html>
